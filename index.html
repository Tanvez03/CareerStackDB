<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CareerStack — Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-left">
                <h1>Career Stack</h1>
                <p>Your next opportunity is one click away.</p>
            </div>
            <div class="login-right">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="showTab('login')">Login</button>
                    <button class="tab-btn" onclick="showTab('register')">Register</button>
                </div>

                <!-- LOGIN -->
                <div id="login-form">
                    <div id="login-error" class="error-msg"></div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" placeholder="you@email.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="••••••••">
                    </div>
                    <button class="btn-primary" style="width:100%;" onclick="handleLogin()">Login</button>
                </div>

                <!-- REGISTER -->
                <div id="register-form" style="display:none;">
                    <div id="register-error" class="error-msg"></div>
                    <div id="register-success" class="success-msg"></div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="reg-name" placeholder="Your full name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="reg-email" placeholder="you@email.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-password" placeholder="Create a password">
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="reg-role">
                            <option value="">Select role</option>
                            <option value="JobSeeker">Job Seeker</option>
                            <option value="Employer">Employer</option>
                        </select>
                    </div>
                    <button class="btn-primary" style="width:100%;" onclick="handleRegister()">Create Account</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000/api';

        function showTab(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            errorDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    errorDiv.textContent = data.message || 'Login failed';
                    errorDiv.style.display = 'block';
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                if (data.user.role === 'JobSeeker') window.location.href = 'seeker.html';
                else if (data.user.role === 'Employer') window.location.href = 'employer.html';
                else if (data.user.role === 'Admin') window.location.href = 'admin.html';

            } catch (err) {
                errorDiv.textContent = 'Cannot connect to server';
                errorDiv.style.display = 'block';
            }
        }

        async function handleRegister() {
            const fullName = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const role = document.getElementById('reg-role').value;
            const errorDiv = document.getElementById('register-error');
            const successDiv = document.getElementById('register-success');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!fullName || !email || !password || !role) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password, role })
                });
                const data = await res.json();

                if (!res.ok) {
                    errorDiv.textContent = data.message || 'Registration failed';
                    errorDiv.style.display = 'block';
                    return;
                }

                successDiv.textContent = 'Account created! You can now log in.';
                successDiv.style.display = 'block';
                setTimeout(() => showTab('login'), 2000);

            } catch (err) {
                errorDiv.textContent = 'Cannot connect to server';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
