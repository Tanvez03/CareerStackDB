<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CareerStack — Find Jobs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a class="brand" href="index.html">Career<span>Stack</span></a>
        <div class="nav-links">
            <span id="welcome-msg" style="color:#0066ff;font-size:13px;"></span>
            <a href="tracking.html">My Applications</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="hero">
        <h2>Find your next role</h2>
        <p>Browse open positions from top companies</p>
        <div class="hero-search">
            <input type="text" id="search-input" placeholder="Search by title or company...">
            <button onclick="filterJobs()">Search</button>
        </div>
    </div>

    <div class="container">
        <div class="layout-sidebar">
            <div class="sidebar">
                <div class="card">
                    <h4>Filters</h4>
                    <span class="filter-label">Location</span>
                    <input class="filter-inp" id="filter-location" placeholder="City or Remote">
                    <span class="filter-label">Job type</span>
                    <select class="filter-inp" id="filter-type">
                        <option value="">All types</option>
                        <option>Full-Time</option>
                        <option>Part-Time</option>
                        <option>Contract</option>
                    </select>
                    <span class="filter-label">Salary</span>
                    <select class="filter-inp" id="filter-salary">
                        <option value="">Any</option>
                        <option>$40k–$60k</option>
                        <option>$60k–$80k</option>
                        <option>$80k–$100k</option>
                        <option>$100k+</option>
                    </select>
                    <button class="btn-primary" style="width:100%;" onclick="filterJobs()">Apply filters</button>
                </div>
            </div>
            <div class="main-content">
                <div id="job-listings">
                    <p style="color:#888;font-size:13px;">Loading jobs...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000/api';
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));

        if (!token || !user) window.location.href = 'index.html';

        document.getElementById('welcome-msg').textContent = `Hi, ${user.fullName}`;

        let allJobs = [];

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function getBadgeClass(type) {
            if (type === 'Full-Time') return 'badge-blue';
            if (type === 'Part-Time') return 'badge-teal';
            if (type === 'Contract') return 'badge-gray';
            return 'badge-gray';
        }

        function renderJobs(jobs) {
            const container = document.getElementById('job-listings');
            if (jobs.length === 0) {
                container.innerHTML = '<p style="color:#888;font-size:13px;">No jobs found.</p>';
                return;
            }
            container.innerHTML = jobs.map(job => `
                <div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                        <div>
                            <h3>${job.Title}</h3>
                            <p>${job.Company_Name} &bull; ${job.Location} &bull; ${job.Salary_Range}</p>
                        </div>
                        <span class="badge ${getBadgeClass(job.Employment_Type)}">${job.Employment_Type}</span>
                    </div>
                    <span class="badge badge-green" style="margin-bottom:10px;display:inline-block;">Open</span><br>
                    <button class="btn-primary btn-small" onclick="applyJob(${job.JobID}, '${job.Title}')">Apply now</button>
                </div>
            `).join('');
        }

        function filterJobs() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const location = document.getElementById('filter-location').value.toLowerCase();
            const type = document.getElementById('filter-type').value;

            const filtered = allJobs.filter(job => {
                const matchSearch = job.Title.toLowerCase().includes(search) || job.Company_Name.toLowerCase().includes(search);
                const matchLocation = location ? job.Location.toLowerCase().includes(location) : true;
                const matchType = type ? job.Employment_Type === type : true;
                return matchSearch && matchLocation && matchType;
            });
            renderJobs(filtered);
        }

        async function applyJob(jobId, title) {
            try {
                const res = await fetch(`${API}/applications`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ seeker_id: user.userId, job_id: jobId })
                });
                const data = await res.json();
                alert(data.message);
            } catch (err) {
                alert('Failed to apply. Please try again.');
            }
        }

        async function loadJobs() {
            try {
                const res = await fetch(`${API}/jobs`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                allJobs = await res.json();
                renderJobs(allJobs);
            } catch (err) {
                document.getElementById('job-listings').innerHTML = '<p style="color:#cc0000;font-size:13px;">Failed to load jobs.</p>';
            }
        }

        loadJobs();
    </script>
</body>
</html>
