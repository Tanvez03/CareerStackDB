<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CareerStack — Employer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a class="brand" href="index.html">Career<span>Stack</span></a>
        <div class="nav-links">
            <span id="welcome-msg" style="color:#0066ff;font-size:13px;"></span>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="stat-grid">
            <div class="stat-card"><div class="stat-label">Active listings</div><div class="stat-val" id="stat-listings">—</div></div>
            <div class="stat-card"><div class="stat-label">Total applicants</div><div class="stat-val" id="stat-applicants" style="color:#0052cc">—</div></div>
            <div class="stat-card"><div class="stat-label">Accepted</div><div class="stat-val" id="stat-accepted" style="color:#007a3d">—</div></div>
        </div>

        <div class="top-bar">
            <h1 class="page-title" style="margin:0;">My Job Listings</h1>
            <button class="btn-primary" onclick="document.getElementById('post-modal').style.display='flex'">+ Post New Job</button>
        </div>

        <div id="employer-listings">
            <p style="color:#888;font-size:13px;">Loading listings...</p>
        </div>
    </div>

    <!-- POST JOB MODAL -->
    <div id="post-modal" class="modal-overlay">
        <div class="modal-box">
            <h2>Post a New Job</h2>
            <div id="post-error" class="error-msg"></div>
            <div class="form-group"><label>Job Title</label><input type="text" id="post-title" placeholder="e.g. Software Engineer"></div>
            <div class="form-group"><label>Location</label><input type="text" id="post-location" placeholder="e.g. Houston, TX or Remote"></div>
            <div class="form-group"><label>Employment Type</label>
                <select id="post-type"><option>Full-Time</option><option>Part-Time</option><option>Contract</option></select>
            </div>
            <div class="form-group"><label>Salary Range</label><input type="text" id="post-salary" placeholder="e.g. $80k–$100k"></div>
            <div class="form-group"><label>Application Deadline</label><input type="date" id="post-deadline"></div>
            <div class="form-group"><label>Description</label><textarea id="post-desc" rows="3" placeholder="Job description..."></textarea></div>
            <div style="display:flex;gap:8px;">
                <button class="btn-primary" onclick="postJob()">Post Job</button>
                <button class="btn-outline" onclick="document.getElementById('post-modal').style.display='none'">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000/api';
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));

        if (!token || !user) window.location.href = 'index.html';

        document.getElementById('welcome-msg').textContent = `Hi, ${user.fullName}`;

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function renderListings(jobs) {
            const container = document.getElementById('employer-listings');
            if (jobs.length === 0) {
                container.innerHTML = '<p style="color:#888;font-size:13px;">No listings yet. Post your first job!</p>';
                return;
            }
            container.innerHTML = jobs.map(job => `
                <div class="employer-card">
                    <div>
                        <h3>${job.Title}</h3>
                        <p>${job.Location} &bull; ${job.Employment_Type}</p>
                    </div>
                    <div class="employer-card-actions">
                        <span class="badge ${job.Status === 'Open' ? 'badge-green' : 'badge-red'}">${job.Status}</span>
                        <button class="btn-danger btn-small" onclick="deleteJob(${job.JobID})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadListings() {
            try {
                const res = await fetch(`${API}/jobs/employer/${user.userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const jobs = await res.json();

                document.getElementById('stat-listings').textContent = jobs.filter(j => j.Status === 'Open').length;
                document.getElementById('stat-applicants').textContent = '—';
                document.getElementById('stat-accepted').textContent = '—';

                renderListings(jobs);
            } catch (err) {
                document.getElementById('employer-listings').innerHTML = '<p style="color:#cc0000;font-size:13px;">Failed to load listings.</p>';
            }
        }

        async function postJob() {
            const errorDiv = document.getElementById('post-error');
            errorDiv.style.display = 'none';

            const body = {
                title: document.getElementById('post-title').value,
                location: document.getElementById('post-location').value,
                employment_type: document.getElementById('post-type').value,
                salary_range: document.getElementById('post-salary').value,
                deadline: document.getElementById('post-deadline').value,
                description: document.getElementById('post-desc').value,
            };

            if (!body.title || !body.location) {
                errorDiv.textContent = 'Title and location are required';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API}/jobs`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (!res.ok) {
                    errorDiv.textContent = data.message || 'Failed to post job';
                    errorDiv.style.display = 'block';
                    return;
                }

                document.getElementById('post-modal').style.display = 'none';
                loadListings();
            } catch (err) {
                errorDiv.textContent = 'Cannot connect to server';
                errorDiv.style.display = 'block';
            }
        }

        async function deleteJob(jobId) {
            if (!confirm('Are you sure you want to delete this listing?')) return;
            try {
                await fetch(`${API}/jobs/${jobId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadListings();
            } catch (err) {
                alert('Failed to delete job');
            }
        }

        loadListings();
    </script>
</body>
</html>
